<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Singapore — Planning Areas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050608;
    --text-1: rgba(255, 255, 255, 0.94);
    --text-2: rgba(255, 255, 255, 0.55);
    --text-3: rgba(255, 255, 255, 0.32);
    --text-4: rgba(255, 255, 255, 0.18);
    --glass: rgba(255, 255, 255, 0.028);
    --glass-hover: rgba(255, 255, 255, 0.055);
    --glass-active: rgba(255, 255, 255, 0.095);
    --border: rgba(255, 255, 255, 0.07);
    --border-strong: rgba(255, 255, 255, 0.14);
    --blur: blur(40px) saturate(180%);
    --ease: cubic-bezier(0.32, 0.72, 0, 1);
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);

    --serif: "Instrument Serif", "Times New Roman", serif;
    --sans: "Geist", -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    --mono: "Geist Mono", "SF Mono", "JetBrains Mono", monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg);
    color: var(--text-1); font-family: var(--sans); }
  #app { position: absolute; inset: 0; }
  #threejs { width: 100%; height: 100%; cursor: default; }
  #threejs canvas { display: block; }

  /* === Top: Hero Title === */
  .hero {
    position: absolute; top: 56px; left: 50%; transform: translateX(-50%);
    z-index: 50; text-align: center; pointer-events: none;
    opacity: 0; animation: heroIn 1.2s var(--ease-out) 0.3s forwards;
  }
  .hero .title {
    font-family: var(--serif);
    font-size: 72px;
    font-weight: 400;
    font-style: italic;
    color: var(--text-1);
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .hero .meta {
    margin-top: 16px;
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-3);
  }
  .hero .meta .dot { color: var(--text-4); margin: 0 8px; }

  @keyframes heroIn {
    from { opacity: 0; transform: translateX(-50%) translateY(-12px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* === Bottom: Control bar === */
  .controls {
    position: absolute; bottom: 48px; left: 50%; transform: translateX(-50%);
    z-index: 50; display: flex; gap: 2px;
    padding: 5px; border-radius: 999px;
    background: var(--glass);
    backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--border);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    opacity: 0; animation: controlsIn 1s var(--ease-out) 1.6s forwards;
  }
  @keyframes controlsIn {
    from { opacity: 0; transform: translateX(-50%) translateY(12px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }
  .controls button {
    appearance: none; background: transparent; border: none; cursor: pointer;
    font-family: var(--sans); font-size: 12px; font-weight: 500;
    color: var(--text-2); letter-spacing: 0.02em;
    padding: 9px 18px; border-radius: 999px;
    transition: color 280ms var(--ease), background 280ms var(--ease);
    display: flex; align-items: center; gap: 7px;
  }
  .controls button:hover { color: var(--text-1); background: var(--glass-hover); }
  .controls button.active { color: var(--text-1); background: var(--glass-active); }
  .controls button .indicator {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text-4); transition: background 280ms var(--ease), box-shadow 280ms var(--ease);
  }
  .controls button.active .indicator {
    background: #ffffff; box-shadow: 0 0 8px rgba(255, 255, 255, 0.6);
  }

  /* === Bottom-left: Hint === */
  .hint {
    position: absolute; bottom: 56px; left: 48px; z-index: 50;
    font-family: var(--sans); font-size: 11px; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--text-3); line-height: 2;
    opacity: 0; animation: fadeIn 1s var(--ease-out) 2s forwards;
  }
  .hint .key {
    display: inline-block;
    font-family: var(--mono); font-size: 10px;
    color: var(--text-2); letter-spacing: 0;
    padding: 2px 6px; border-radius: 4px;
    background: var(--glass); border: 1px solid var(--border);
    margin-right: 6px; text-transform: none;
  }
  @keyframes fadeIn { to { opacity: 1; } }

  /* === Bottom-right: Counter === */
  .counter {
    position: absolute; bottom: 56px; right: 48px; z-index: 50;
    text-align: right; font-family: var(--sans);
    opacity: 0; animation: fadeIn 1s var(--ease-out) 2s forwards;
  }
  .counter .num {
    font-family: var(--serif); font-style: italic; font-weight: 400;
    font-size: 38px; line-height: 1; color: var(--text-1);
  }
  .counter .label {
    font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--text-3); margin-top: 8px;
  }

  /* === Right-side info card === */
  #card {
    position: absolute; top: 50%; right: 48px; transform: translateY(-50%) translateX(40px);
    z-index: 60; width: 340px;
    padding: 36px 32px;
    border-radius: 24px;
    background: var(--glass);
    backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--border);
    box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
    opacity: 0; pointer-events: none;
    transition: opacity 480ms var(--ease-out), transform 560ms var(--ease-out);
  }
  #card.show { opacity: 1; transform: translateY(-50%) translateX(0); pointer-events: auto; }
  #card .card_close {
    position: absolute; top: 18px; right: 18px;
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--text-3);
    transition: color 240ms var(--ease), background 240ms var(--ease);
  }
  #card .card_close:hover { color: var(--text-1); background: var(--glass-hover); }
  #card .card_close svg { width: 14px; height: 14px; }
  #card .card_eyebrow {
    font-size: 10px; letter-spacing: 0.24em;
    text-transform: uppercase; color: var(--text-3);
    margin-bottom: 10px;
  }
  #card .card_name {
    font-family: var(--serif); font-style: italic; font-weight: 400;
    font-size: 40px; line-height: 1.05; color: var(--text-1);
    margin-bottom: 28px; letter-spacing: -0.02em;
  }
  #card .stat {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 14px 0; border-top: 1px solid var(--border);
  }
  #card .stat:last-child { border-bottom: 1px solid var(--border); }
  #card .stat_label {
    font-size: 11px; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--text-2);
  }
  #card .stat_value {
    font-family: var(--mono); font-weight: 400; font-size: 16px;
    color: var(--text-1); letter-spacing: -0.01em;
  }
  #card .stat_value .unit { color: var(--text-3); margin-left: 4px; font-size: 12px; }

  /* === Loading === */
  .loading {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
    z-index: 100; text-align: center; display: none;
    font-family: var(--serif); font-style: italic; font-size: 32px;
    color: var(--text-2); letter-spacing: -0.01em;
  }
  .loading.show { display: block; animation: fadeIn 0.5s ease-out forwards; }
  .loading.error { color: rgba(255, 100, 110, 0.9); font-family: var(--sans);
    font-style: normal; font-size: 14px; letter-spacing: 0.1em; text-transform: uppercase; }

  /* === Map tags (CSS2D) === */
  .mapTag {
    pointer-events: none;
    font-family: var(--sans);
    font-size: 10px; color: var(--text-1);
    letter-spacing: 0.06em;
    transform: translateY(-8px);
    opacity: 0; transition: opacity 320ms var(--ease);
    white-space: nowrap;
    text-shadow: 0 1px 4px rgba(0, 0, 0, 0.9);
  }
  .mapTag.visible { opacity: 0.7; }
  .mapTag .tagName { font-weight: 500; text-transform: capitalize; }
  .mapTag .tagDot {
    display: inline-block; width: 3px; height: 3px; border-radius: 50%;
    background: rgba(255, 255, 255, 0.85); margin-right: 6px;
    vertical-align: middle;
    box-shadow: 0 0 6px rgba(255, 255, 255, 0.6);
  }

  /* === Subtle vignette === */
  .vignette {
    position: absolute; inset: 0; pointer-events: none; z-index: 10;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0, 0, 0, 0.4) 100%);
  }
</style>
</head>
<body>
<div id="app">
  <div id="threejs"></div>
  <div class="vignette"></div>

  <header class="hero">
    <div class="title">Singapore</div>
    <div class="meta">Planning Areas <span class="dot">·</span> URA Master Plan</div>
  </header>

  <div class="counter">
    <div class="num" id="counter_num">55</div>
    <div class="label">Districts</div>
  </div>

  <div class="hint">
    <span class="key">Click</span>to explore<br>
    <span class="key">Drag</span>to rotate<span style="margin: 0 12px; color: var(--text-4)">·</span>
    <span class="key">Scroll</span>to zoom
  </div>

  <nav class="controls" id="controls">
    <button class="active" data-value="pillars"><span class="indicator"></span>Pillars</button>
    <button class="active" data-value="tags"><span class="indicator"></span>Tags</button>
    <button class="active" data-value="ripple"><span class="indicator"></span>Ripple</button>
    <button class="active" data-value="particles"><span class="indicator"></span>Atmosphere</button>
  </nav>

  <aside id="card">
    <div class="card_close" id="card_close">
      <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4">
        <path d="M2 2 L12 12 M12 2 L2 12"/>
      </svg>
    </div>
    <div class="card_eyebrow">Planning Area</div>
    <div class="card_name" id="card_name">—</div>
    <div class="stat"><div class="stat_label">Visitor Flow</div>
      <div class="stat_value" id="stat_inflow">—<span class="unit">k</span></div></div>
    <div class="stat"><div class="stat_label">Capacity</div>
      <div class="stat_value" id="stat_cap">—<span class="unit">k</span></div></div>
    <div class="stat"><div class="stat_label">Utilization</div>
      <div class="stat_value" id="stat_traffic">—<span class="unit">%</span></div></div>
    <div class="stat"><div class="stat_label">Trend Index</div>
      <div class="stat_value" id="stat_hot">—</div></div>
  </aside>

  <div class="loading" id="loading">Loading</div>
</div>

/* =================== Three.js setup =================== */
const container = document.getElementById('threejs');
let W = window.innerWidth, H = window.innerHeight;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050608);

const camera = new THREE.PerspectiveCamera(38, W / H, 0.1, 2000);
camera.position.set(-20, 200, 200);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(W, H);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
container.appendChild(renderer.domElement);

const css2DRenderer = new CSS2DRenderer();
css2DRenderer.setSize(W, H);
Object.assign(css2DRenderer.domElement.style,
  { position: 'absolute', top: '0', left: '0', pointerEvents: 'none' });
container.appendChild(css2DRenderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 70;
controls.maxDistance = 320;
controls.maxPolarAngle = Math.PI / 2.05;
controls.target.set(0, 0, 0);

// Lighting — soft, ambient-led
scene.add(new THREE.AmbientLight(0xffffff, 0.45));
const keyLight = new THREE.DirectionalLight(0xeef4ff, 0.65);
keyLight.position.set(30, 80, 50);
scene.add(keyLight);
const fillLight = new THREE.DirectionalLight(0x6688aa, 0.25);
fillLight.position.set(-30, 40, -30);
scene.add(fillLight);

// Postprocessing — gentler bloom
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(new THREE.Vector2(W, H), 0.35, 0.5, 0.85);
composer.addPass(bloomPass);
composer.addPass(new OutputPass());

/* =================== Projection =================== */
const PROJ_CENTER = [103.85, 1.35];
const PROJ_SCALE = 200;
function projection([lng, lat]) {
  return [(lng - PROJ_CENTER[0]) * PROJ_SCALE, (lat - PROJ_CENTER[1]) * PROJ_SCALE];
}

/* =================== Materials =================== */
const EXTRUDE_DEPTH = 1.8;
const mapUf = { uTime: { value: 0.0 } };

// Side: refined gradient, less neon
const sideMaterial = new THREE.ShaderMaterial({
  uniforms: {
    uTime: mapUf.uTime,
    uColorBottom: { value: new THREE.Color(0x0a1424) },
    uColorTop: { value: new THREE.Color(0x6a8caf) }
  },
  vertexShader: `
    varying float vT;
    void main() {
      vT = position.z / 1.8;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform vec3 uColorBottom;
    uniform vec3 uColorTop;
    uniform float uTime;
    varying float vT;
    void main() {
      float t = smoothstep(0.0, 1.0, vT);
      vec3 col = mix(uColorBottom, uColorTop, t);
      gl_FragColor = vec4(col, 1.0);
    }
  `
});

// Top: refined dark slate, almost uniform
function createTopMaterial() {
  return new THREE.MeshPhongMaterial({
    color: 0x1a2435,
    emissive: 0x0a1018,
    specular: 0x445566,
    shininess: 35,
    transparent: true,
    opacity: 0.97
  });
}

/* =================== Subtle floor === */
// A faint radial gradient floor to give depth without grid
const floorGeom = new THREE.CircleGeometry(280, 64);
const floorMat = new THREE.ShaderMaterial({
  uniforms: { uColor: { value: new THREE.Color(0x0c1422) } },
  vertexShader: `
    varying vec2 vUv;
    varying vec3 vPos;
    void main() {
      vUv = uv;
      vPos = position;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform vec3 uColor;
    varying vec3 vPos;
    void main() {
      float d = length(vPos.xy) / 280.0;
      float a = (1.0 - smoothstep(0.0, 0.85, d)) * 0.45;
      gl_FragColor = vec4(uColor, a);
    }
  `,
  transparent: true,
  depthWrite: false
});
const floor = new THREE.Mesh(floorGeom, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -2;
scene.add(floor);

/* =================== Atmosphere (subtle particles) === */
const particleCount = 250;
const pGeom = new THREE.BufferGeometry();
const pPos = new Float32Array(particleCount * 3);
const pVel = new Float32Array(particleCount);
for (let i = 0; i < particleCount; i++) {
  const r = 30 + Math.random() * 80;
  const a = Math.random() * Math.PI * 2;
  pPos[i*3] = Math.cos(a) * r;
  pPos[i*3+1] = Math.random() * 60;
  pPos[i*3+2] = Math.sin(a) * r;
  pVel[i] = 0.03 + Math.random() * 0.07;
}
pGeom.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
const particles = new THREE.Points(pGeom, new THREE.PointsMaterial({
  color: 0xffffff, size: 0.35, transparent: true, opacity: 0.35,
  blending: THREE.AdditiveBlending, depthWrite: false
}));
scene.add(particles);

/* =================== Ripple (single, refined) === */
const rippleRings = [];
const rippleGroup = new THREE.Group();
for (let i = 0; i < 3; i++) {
  const g = new THREE.RingGeometry(20, 20.12, 96);
  const m = new THREE.MeshBasicMaterial({
    color: 0xffffff, side: THREE.DoubleSide,
    transparent: true, opacity: 0,
    depthWrite: false
  });
  const ring = new THREE.Mesh(g, m);
  ring.rotation.x = -Math.PI / 2;
  ring.position.y = -1.7;
  ring.userData.phase = i / 3;
  rippleRings.push(ring);
  rippleGroup.add(ring);
}
scene.add(rippleGroup);

/* =================== Map === */
const mapGroup = new THREE.Group();
mapGroup.name = 'singapore';
mapGroup.rotation.x = -Math.PI / 2;
scene.add(mapGroup);

const modelByName = new Map();
const allBeams = [];

function toTitleCase(s) {
  if (!s) return '';
  return s.toLowerCase().replace(/\b\w/g, c => c.toUpperCase()).replace('-', '-');
}

function drawFeature(feature, parentGroup, seed) {
  const props = feature.properties || {};
  const rawName = props.name || `Area ${seed}`;
  const name = toTitleCase(rawName);

  const model = new THREE.Object3D();
  model.name = name;
  model.userData.rawName = rawName;
  model.userData.props = props;

  const coords = feature.geometry.coordinates;
  const type = feature.geometry.type;

  const topMat = createTopMaterial();
  model.userData.topMat = topMat;

  let cxSum = 0, cySum = 0, cN = 0;

  const drawShape = (ring, isOuter) => {
    const shape = new THREE.Shape();
    ring.forEach((pt, i) => {
      const [x, y] = projection(pt);
      if (i === 0) shape.moveTo(x, y);
      else shape.lineTo(x, y);
      if (isOuter) { cxSum += x; cySum += y; cN++; }
    });
    const geom = new THREE.ExtrudeGeometry(shape, {
      depth: EXTRUDE_DEPTH, bevelEnabled: false
    });
    const mesh = new THREE.Mesh(geom, [topMat, sideMaterial]);
    model.add(mesh);

    // Refined border: very thin, soft icy-white
    const linePts = ring.map(pt => {
      const [x, y] = projection(pt);
      return new THREE.Vector3(x, y, EXTRUDE_DEPTH + 0.015);
    });
    const lineGeom = new THREE.BufferGeometry().setFromPoints(linePts);
    const line = new THREE.Line(lineGeom, new THREE.LineBasicMaterial({
      color: 0xc8d6e8, transparent: true, opacity: 0.35
    }));
    line.name = 'border';
    model.add(line);
  };

  if (type === 'MultiPolygon') {
    coords.forEach(poly => poly.forEach((ring, i) => drawShape(ring, i === 0)));
  } else if (type === 'Polygon') {
    coords.forEach((ring, i) => drawShape(ring, i === 0));
  }

  if (cN > 0) {
    const cx = cxSum / cN;
    const cy = cySum / cN;
    model.userData.center = [cx, cy];

    // Deterministic mock data per area (consistent across reloads)
    const h = hashStr(rawName);
    const value = 100 + h % 900;
    const capacity = 1000 + (h * 7) % 3000;
    const traffic = 60 + (h * 11) % 35;
    const trend = 70 + (h * 13) % 30;
    model.userData.metrics = {
      inflow: value, capacity, traffic: traffic + (h % 10) / 10, trend: trend + (h % 10) / 10
    };

    // Refined tag — minimal, with dot
    const tagDiv = document.createElement('div');
    tagDiv.className = 'mapTag visible';
    tagDiv.innerHTML = `<span class="tagDot"></span><span class="tagName">${name}</span>`;
    const tagObj = new CSS2DObject(tagDiv);
    tagObj.name = 'tag';
    tagObj.position.set(cx, cy, EXTRUDE_DEPTH + 0.5);
    model.add(tagObj);

    // Refined pillar: a thin vertical beam, height by value
    const beam = makeBeam(cx, cy, value);
    beam.name = 'pillar';
    model.add(beam);
    allBeams.push(beam);
  }

  parentGroup.add(model);
  modelByName.set(name, model);
}

function hashStr(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
  return Math.abs(h);
}

function makeBeam(x, y, value) {
  const group = new THREE.Group();
  const h = 4 + (value / 1000) * 14; // 4..18

  // Vertical beam — gradient cylinder, top white, bottom transparent
  const beamGeom = new THREE.CylinderGeometry(0.04, 0.04, h, 6);
  const beamMat = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    vertexShader: `
      varying float vY;
      void main() {
        vY = position.y;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      varying float vY;
      uniform float uHalfH;
      void main() {
        float t = (vY + uHalfH) / (2.0 * uHalfH); // 0 bottom -> 1 top
        float alpha = pow(t, 1.4) * 0.9;
        gl_FragColor = vec4(1.0, 1.0, 1.0, alpha);
      }
    `,
    uniforms: { uHalfH: { value: h / 2 } }
  });
  const beam = new THREE.Mesh(beamGeom, beamMat);
  beam.position.set(x, y, EXTRUDE_DEPTH + h / 2);
  beam.rotation.x = Math.PI / 2;
  group.add(beam);

  // Top glow dot
  const dotGeom = new THREE.SphereGeometry(0.18, 12, 12);
  const dotMat = new THREE.MeshBasicMaterial({
    color: 0xffffff, transparent: true, opacity: 0.95
  });
  const dot = new THREE.Mesh(dotGeom, dotMat);
  dot.position.set(x, y, EXTRUDE_DEPTH + h);
  group.add(dot);

  // Soft halo at top
  const haloGeom = new THREE.SphereGeometry(0.55, 16, 16);
  const haloMat = new THREE.MeshBasicMaterial({
    color: 0xffffff, transparent: true, opacity: 0.18,
    blending: THREE.AdditiveBlending, depthWrite: false
  });
  const halo = new THREE.Mesh(haloGeom, haloMat);
  halo.position.set(x, y, EXTRUDE_DEPTH + h);
  group.add(halo);
  group.userData.halo = halo;
  group.userData.height = h;
  return group;
}

function centerMap(group) {
  const box = new THREE.Box3().setFromObject(group);
  const center = new THREE.Vector3();
  box.getCenter(center);
  group.children.forEach(c => {
    c.position.x -= center.x;
    c.position.y -= -center.z;
  });
}

/* =================== Load === */
const loadingEl = document.getElementById('loading');

async function loadMap() {
  loadingEl.classList.add('show');
  try {
    const data = INLINE_GEOJSON;
    console.log('[demo] features:', data.features.length);
    data.features.forEach((f, i) => drawFeature(f, mapGroup, i));
    centerMap(mapGroup);
    document.getElementById('counter_num').textContent = mapGroup.children.length;
  } catch (e) {
    console.error('[demo] loadMap failed:', e);
    loadingEl.textContent = 'Failed to load';
    loadingEl.classList.add('error');
    return;
  }
  loadingEl.classList.remove('show');
}

/* =================== Card === */
const card = document.getElementById('card');
const cardName = document.getElementById('card_name');
const statInflow = document.getElementById('stat_inflow');
const statCap = document.getElementById('stat_cap');
const statTraffic = document.getElementById('stat_traffic');
const statHot = document.getElementById('stat_hot');

document.getElementById('card_close').addEventListener('click', closeCard);

let highlighted = null;

function showCard(model) {
  const m = model.userData.metrics;
  cardName.textContent = model.name;
  statInflow.innerHTML = `${m.inflow}<span class="unit">k</span>`;
  statCap.innerHTML = `${m.capacity}<span class="unit">k</span>`;
  statTraffic.innerHTML = `${m.traffic.toFixed(1)}<span class="unit">%</span>`;
  statHot.innerHTML = `${m.trend.toFixed(1)}`;
  card.classList.add('show');
  highlightModel(model);
}

function closeCard() {
  card.classList.remove('show');
  clearHighlight();
}

function highlightModel(model) {
  clearHighlight();
  const mat = model.userData.topMat;
  if (!mat) return;
  mat.userData = mat.userData || {};
  mat.userData.origColor = mat.color.getHex();
  mat.userData.origEmissive = mat.emissive.getHex();
  // Apple-style highlight: warm white tint, no neon
  mat.color.setHex(0xe8edf2);
  mat.emissive.setHex(0x223040);
  highlighted = model;
}

function clearHighlight() {
  if (!highlighted) return;
  const mat = highlighted.userData.topMat;
  if (mat && mat.userData) {
    if (mat.userData.origColor !== undefined) mat.color.setHex(mat.userData.origColor);
    if (mat.userData.origEmissive !== undefined) mat.emissive.setHex(mat.userData.origEmissive);
  }
  highlighted = null;
}

/* =================== Interaction === */
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function pick(event) {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const meshes = [];
  mapGroup.children.forEach(m => m.children.forEach(c => { if (c.isMesh) meshes.push(c); }));
  const hits = raycaster.intersectObjects(meshes, false);
  return hits.length ? hits[0].object.parent : null;
}

// Hover: subtle cursor change
let hovered = null;
renderer.domElement.addEventListener('mousemove', (e) => {
  const model = pick(e);
  if (model !== hovered) {
    hovered = model;
    renderer.domElement.style.cursor = model ? 'pointer' : 'default';
  }
});

renderer.domElement.addEventListener('click', (e) => {
  const model = pick(e);
  if (model) showCard(model);
  else closeCard();
});

/* =================== Toggle buttons === */
const toggles = { pillars: true, tags: true, ripple: true, particles: true };
document.querySelectorAll('.controls button').forEach(btn => {
  btn.addEventListener('click', () => {
    const v = btn.dataset.value;
    toggles[v] = !toggles[v];
    btn.classList.toggle('active', toggles[v]);
    applyToggles();
  });
});

function applyToggles() {
  mapGroup.traverse(obj => {
    if (obj.name === 'pillar') obj.visible = toggles.pillars;
    if (obj.name === 'tag') {
      // Use class toggle so opacity transitions
      if (obj.element) {
        obj.element.classList.toggle('visible', toggles.tags);
      }
    }
  });
  rippleGroup.visible = toggles.ripple;
  particles.visible = toggles.particles;
}

/* =================== Render loop === */
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const t = clock.getElapsedTime();

  controls.update();
  mapUf.uTime.value = (mapUf.uTime.value + dt) % 5;

  // Ripple
  if (toggles.ripple) {
    rippleRings.forEach((ring, i) => {
      const phase = ((t * 0.18 + ring.userData.phase) % 1);
      const scale = 1 + phase * 5;
      ring.scale.set(scale, scale, 1);
      ring.material.opacity = Math.pow(1 - phase, 1.6) * 0.22;
    });
  }

  // Particles
  if (toggles.particles) {
    const arr = pGeom.attributes.position.array;
    for (let i = 0; i < particleCount; i++) {
      arr[i*3+1] -= pVel[i];
      if (arr[i*3+1] < -1.5) arr[i*3+1] = 60;
    }
    pGeom.attributes.position.needsUpdate = true;
  }

  // Beam halo pulse — only if pillars visible
  if (toggles.pillars) {
    allBeams.forEach((beam, i) => {
      if (beam.userData.halo) {
        const s = 1 + 0.35 * Math.sin(t * 1.3 + i * 0.27);
        beam.userData.halo.scale.set(s, s, s);
        beam.userData.halo.material.opacity = 0.12 + 0.08 * (0.5 + 0.5 * Math.sin(t * 1.3 + i * 0.27));
      }
    });
  }

  // Card position follow (right edge stays fixed; nothing to do)
  composer.render();
  css2DRenderer.render(scene, camera);
}

/* =================== Resize === */
window.addEventListener('resize', () => {
  W = window.innerWidth; H = window.innerHeight;
  camera.aspect = W / H;
  camera.updateProjectionMatrix();
  renderer.setSize(W, H);
  composer.setSize(W, H);
  css2DRenderer.setSize(W, H);
  bloomPass.setSize(W, H);
});

/* =================== Intro camera === */
function introAnim() {
  const start = { x: -20, y: 200, z: 200 };
  const end = { x: 0, y: 105, z: 135 };
  const duration = 2400;
  const t0 = performance.now();
  function step() {
    const elapsed = performance.now() - t0;
    let p = Math.min(elapsed / duration, 1);
    // Apple-style ease-out: cubic
    p = 1 - Math.pow(1 - p, 3.5);
    camera.position.set(
      start.x + (end.x - start.x) * p,
      start.y + (end.y - start.y) * p,
      start.z + (end.z - start.z) * p
    );
    controls.target.set(0, 0, 0);
    if (p < 1) requestAnimationFrame(step);
  }
  step();
}

/* =================== Boot === */
animate();
loadMap().then(() => {
  setTimeout(introAnim, 600); // Let hero title appear first
});
</script>
